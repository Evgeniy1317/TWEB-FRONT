# Сборка Vite и публикация на GitHub Pages.
# Обновлённые версии actions (Node 24) убирают предупреждения о deprecation Node 20.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Verify production output (not dev index.html)
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo 'dist/index.html still points to /src/main.tsx — vite build did not run correctly.'
            exit 1
          fi
          if ! grep -q 'TWEB-FRONT/assets/' dist/index.html; then
            echo 'dist/index.html has no /TWEB-FRONT/assets/ — check vite base for GitHub Pages.'
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
